<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!--
    Character Forge app icon (T17). Neutral placeholder: a d20 glyph on the
    dark app surface, drawn in the arcane-indigo accent. Colors are the token
    values (surface-bg #121317, accent #7a6fe0) hard-coded here because an icon
    file can't read CSS custom properties. Francesco restyles later.
  -->
  <rect width="512" height="512" fill="#121317"/>
  <g fill="none" stroke="#7a6fe0" stroke-width="16" stroke-linejoin="round" stroke-linecap="round">
    <!-- outer hexagon (d20 silhouette, pointy-top) -->
    <polygon points="256,64 422,160 422,352 256,448 90,352 90,160" fill="#7a6fe0" fill-opacity="0.10"/>
    <!-- central face triangle -->
    <polygon points="256,168 340,312 172,312" fill="#7a6fe0" fill-opacity="0.18"/>
    <!-- facet spokes from the central triangle to the hull -->
    <line x1="256" y1="168" x2="256" y2="64"/>
    <line x1="340" y1="312" x2="422" y2="352"/>
    <line x1="172" y1="312" x2="90" y2="352"/>
    <line x1="256" y1="168" x2="90" y2="160"/>
    <line x1="256" y1="168" x2="422" y2="160"/>
    <line x1="340" y1="312" x2="422" y2="160"/>
    <line x1="172" y1="312" x2="90" y2="160"/>
    <line x1="340" y1="312" x2="256" y2="448"/>
    <line x1="172" y1="312" x2="256" y2="448"/>
  </g>
</svg>
