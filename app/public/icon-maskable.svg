<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!--
    Maskable variant (T17): same d20 glyph, scaled into the maskable safe zone
    (central ~80%) with a full-bleed dark background so Android/iOS can crop it
    to any shape without clipping the mark.
  -->
  <rect width="512" height="512" fill="#121317"/>
  <g transform="translate(256 256) scale(0.72) translate(-256 -256)"
     fill="none" stroke="#7a6fe0" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="256,64 422,160 422,352 256,448 90,352 90,160" fill="#7a6fe0" fill-opacity="0.10"/>
    <polygon points="256,168 340,312 172,312" fill="#7a6fe0" fill-opacity="0.18"/>
    <line x1="256" y1="168" x2="256" y2="64"/>
    <line x1="340" y1="312" x2="422" y2="352"/>
    <line x1="172" y1="312" x2="90" y2="352"/>
    <line x1="256" y1="168" x2="90" y2="160"/>
    <line x1="256" y1="168" x2="422" y2="160"/>
    <line x1="340" y1="312" x2="422" y2="160"/>
    <line x1="172" y1="312" x2="90" y2="160"/>
    <line x1="340" y1="312" x2="256" y2="448"/>
    <line x1="172" y1="312" x2="256" y2="448"/>
  </g>
</svg>
